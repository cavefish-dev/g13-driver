# Basic profile — general shortcuts.
# A profile is a full binding set. Keys G1–G22; modifiers: ctrl, shift, alt, windows.

[meta]
name = "Basic"
source = "github"

[keys]
G1  = "ctrl+c"
G2  = "ctrl+v"
G3  = "ctrl+z"
G4  = "ctrl+shift+z"
G5  = "f5"
G6  = "alt+tab"
G7  = "windows+d"
G8  = "ctrl+x"
G9  = "ctrl+s"
G10 = "ctrl+a"
G11 = "ctrl+f"
G12 = "ctrl+w"

[labels]
G1  = "Copy"
G2  = "Paste"
G3  = "Undo"
G4  = "Redo"
G5  = "Refresh"
G6  = "Switch Window"
G7  = "Show Desktop"
G8  = "Cut"
G9  = "Save"
G10 = "Select All"
G11 = "Find"
G12 = "Close"

[joystick]
up = "w"
down = "s"
left = "a"
right = "d"
