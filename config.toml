# Manifest: which profile file backs each M-key. Files live in profiles_dir,
# resolved relative to this file's directory. Each profile file is a full binding
# set ([keys] + [joystick]). M1/M2/M3 select the profile; startup uses M1.
#
# (A legacy config with a bare [keys] table still works as a single M1 profile.)
profiles_dir = "profiles"
m1 = "basic.toml"
m2 = "media.toml"

# Auto-repeat timing (global). Uncomment to override the defaults below.
# Per-binding on/off lives in each profile's [repeat] table (Bindings tab checkbox).
# [autorepeat]
# delay_ms = 400      # wait before repeating starts
# interval_ms = 40    # gap between repeats (~25/sec); min 1

# Global joystick deadzone (0–127; distance from center before a direction fires).
[joystick]
deadzone = 30

# App state (managed by the GUI; safe to edit while stopped).
# [app]
# start_active = false   # resume Active (true) or Dry-run (false) on next launch
