# Manifest: which profile file backs each M-key. Files live in profiles_dir,
# resolved relative to this file's directory. Each profile file is a full binding
# set ([keys] + [joystick]). M1/M2/M3 select the profile; startup uses M1.
#
# (A legacy config with a bare [keys] table still works as a single M1 profile.)
profiles_dir = "profiles"
m1 = "basic.toml"
m2 = "media.toml"

# Auto-repeat timing (global). Uncomment to override the defaults below.
# Per-binding on/off lives in each profile's [repeat] table (Bindings tab checkbox).
# [autorepeat]
# delay_ms = 400      # wait before repeating starts
# interval_ms = 40    # gap between repeats (~25/sec); min 1

# Global joystick deadzone (0–127; distance from center before a direction fires).
[joystick]
deadzone = 50

# App state (managed by the GUI; safe to edit while stopped).
# [app]
# start_active = false   # resume Active (true) or Dry-run (false) on next launch

# Keypad backlight (whole-pad single color; per-M-profile). Managed by the GUI
# (Settings + Profiles tabs); safe to edit by hand while stopped.
# [backlight]
# default_color  = "#FFFFFF"   # fallback for a profile with no color of its own
# brightness     = 1.0         # global 0.0-1.0 (0 = off)
# mkey_indicator = true        # light the active profile's M-key LED
# m1_color       = "#FF0000"   # optional per-slot overrides
# m2_color       = "#3030FF"

# LCD content (per-line; managed by the GUI LCD tab, safe to edit by hand while stopped).
# [lcd]
# line1_left    = "name"      # "name" | "version"
# line1_clock   = false       # show an HH:MM clock
# line1_mode    = "label"     # "label" | "icon" | "off"
# line2_source  = "filename"  # "filename" | "display"
# line3_trigger = "last"      # "last" | "held"
# line3_mapping = true        # show the combo/key
# line3_label   = true        # show the mapping label
