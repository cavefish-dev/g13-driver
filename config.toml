# Manifest: which profile file backs each M-key. Files live in profiles_dir,
# resolved relative to this file's directory. Each profile file is a full binding
# set ([keys] + [joystick]). M1/M2/M3 select the profile; startup uses M1.
#
# (A legacy config with a bare [keys] table still works as a single M1 profile.)
profiles_dir = "profiles"
m1 = "default.toml"
m2 = "game.toml"
m3 = "media.toml"
