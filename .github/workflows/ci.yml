name: CI

on:
  push:
    branches: [main]
    paths: &code_paths
      - "src/**"
      - "build.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "version.txt"
      - "ci/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths: *code_paths

jobs:
  build-test:
    # Skip on release commits: the Release workflow builds+publishes those, and a release
    # bump is version-only (version.txt/Cargo.toml/Cargo.lock) — the code was already validated
    # by CI on the commit that introduced it, so re-running the full build+test is redundant.
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'release:') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: windows-x64, os: windows-latest, toolchain: stable-x86_64-pc-windows-gnu }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Version drift guard
        shell: bash
        run: bash ci/check-version.sh

      - name: MinGW-w64 gcc (for rusb/libusb)
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
          update: false
      - name: Put MinGW on PATH
        shell: bash
        run: echo "$(cygpath -w /mingw64/bin)" >> "$GITHUB_PATH"

      - name: Install GNU Rust toolchain
        shell: bash
        run: |
          rustup toolchain install ${{ matrix.toolchain }} --profile minimal
          rustup default ${{ matrix.toolchain }}
          rustc -vV
          gcc --version

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Test
        shell: bash
        run: cargo test

      - name: Build (release)
        shell: bash
        run: cargo build --release
