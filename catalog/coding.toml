# Coding profile — common editor shortcuts.

[meta]
name = "Coding"

[keys]
G1 = "ctrl+c"
G2 = "ctrl+v"
G3 = "ctrl+shift+k"
G4 = "ctrl+f"
G5 = "f2"
G6 = "f12"
G7 = "ctrl+shift+f"
G8 = "ctrl+b"
G9 = "ctrl+t"

[labels]
G1 = "Copy"
G2 = "Paste"
G3 = "Comment Line"
G4 = "Find"
G5 = "Rename"
G6 = "Go to Def"
G7 = "Find in Files"
G8 = "Toggle Sidebar"
G9 = "New Terminal"
